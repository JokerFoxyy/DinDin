name: Security Scan

on:
  # 'feature/**' no push: PRs feature→develop são criados via GITHUB_TOKEN pelo workflow
  # "Auto PR" — eventos do GITHUB_TOKEN não disparam outros workflows via pull_request
  # (limite do GitHub Actions para evitar loop), então sem isso o required check
  # "CodeQL Analysis" nunca reporta status pro PR e fica "Expected — waiting" pra sempre
  # (mesmo problema já corrigido no build-and-test do ci-api.yml).
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  schedule:
    # Roda toda segunda às 6h (UTC) para pegar novas CVEs
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Job único chamado exatamente "CodeQL Analysis" — é o nome do required status check
  # do ruleset. Analisa Java e TypeScript numa só passada (o build do Maven serve de
  # tracing para o Java; o TS é escaneado direto da fonte).
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin, javascript-typescript
          queries: security-and-quality

      - name: Build Java (tracing do CodeQL)
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw compile -DskipTests -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Popula o ~/.m2 para o Trivy resolver o pom localmente
      # (sem isso o Trivy consulta o Maven Central e toma 429 nos runners)
      - name: Generate dependency tree
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw dependency:tree -B -DoutputFile=dep-tree.txt

      - name: Trivy - scan dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-dependency'

  container-scan:
    name: Docker Image Scan (API)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dindin-api:scan api

      - name: Trivy - scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'dindin-api:scan'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-container'

  dependency-review:
    name: Dependency Review (PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always
