name: Auto PR - feature/* → develop

# Usa um PAT (secrets.RELEASE_PAT) em vez do GITHUB_TOKEN padrão para criar o PR: eventos
# disparados pelo GITHUB_TOKEN não acionam outros workflows (regra anti-recursão do GitHub),
# então o `pull_request: opened` criado por esta Action nunca rodava o CI sozinho — precisava
# de `gh run rerun` manual. Com um PAT de usuário real, o evento dispara normalmente.
on:
  push:
    branches: ['feature/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  create-feature-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch info
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          # feature/add-login → add login
          TITLE=$(echo "$BRANCH_NAME" | sed 's|feature/||' | tr '-' ' ' | tr '_' ' ')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          EXISTING_PR=$(gh pr list --base develop --head "${{ steps.branch.outputs.name }}" --state open --json number --jq '.[0].number')
          echo "existing_pr=$EXISTING_PR" >> $GITHUB_OUTPUT

      - name: Create PR feature → develop
        if: steps.check_pr.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          COMMITS=$(git log origin/develop..HEAD --oneline --no-merges | head -20)

          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.name }}" \
            --title "feat: ${{ steps.branch.outputs.title }}" \
            --body "$(cat <<EOF
          ## Feature PR (auto-generated)

          **Branch:** \`${{ steps.branch.outputs.name }}\`

          ### Commits:
          \`\`\`
          $COMMITS
          \`\`\`

          ### Checklist:
          - [ ] Code review completed
          - [ ] Tests passing
          - [ ] No breaking changes

          ---
          *Auto-generated by GitHub Actions on push to feature branch.*
          EOF
          )"

      - name: Update existing PR
        if: steps.check_pr.outputs.existing_pr != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          COMMITS=$(git log origin/develop..HEAD --oneline --no-merges | head -20)

          gh pr comment ${{ steps.check_pr.outputs.existing_pr }} \
            --body "🔄 **Updated** — new commits pushed:
          \`\`\`
          $COMMITS
          \`\`\`"
