name: Auto PR - develop → main

# Usa um PAT (secrets.RELEASE_PAT) em vez do GITHUB_TOKEN padrão para criar o PR: eventos
# disparados pelo GITHUB_TOKEN não acionam outros workflows (regra anti-recursão do GitHub),
# então o `pull_request: opened` criado por esta Action nunca rodava o CI sozinho — precisava
# de `gh run rerun` manual. Com um PAT de usuário real, o evento dispara normalmente.
on:
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          echo "existing_pr=$EXISTING_PR" >> $GITHUB_OUTPUT

      - name: Create PR develop → main
        if: steps.check_pr.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          COMMITS=$(git log origin/main..origin/develop --oneline --no-merges | head -20)

          gh pr create \
            --base main \
            --head develop \
            --title "release: merge develop → main" \
            --body "$(cat <<EOF
          ## Release PR (auto-generated)

          ### Commits included:
          \`\`\`
          $COMMITS
          \`\`\`

          ### Checklist:
          - [ ] All CI checks passing on develop
          - [ ] Code review completed
          - [ ] No breaking changes without migration

          ---
          *Auto-generated by GitHub Actions on push to develop.*
          EOF
          )"

      - name: Update existing PR
        if: steps.check_pr.outputs.existing_pr != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          COMMITS=$(git log origin/main..origin/develop --oneline --no-merges | head -20)

          gh pr comment ${{ steps.check_pr.outputs.existing_pr }} \
            --body "🔄 **Updated** — new commits pushed to develop:
          \`\`\`
          $COMMITS
          \`\`\`"
