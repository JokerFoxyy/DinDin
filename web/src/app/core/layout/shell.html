<div class="layout">
  <button class="menu-toggle" type="button" (click)="toggleSidebar()" aria-label="Abrir menu">☰</button>
  @if (sidebarOpen()) {
    <div class="sidebar-backdrop" (click)="closeSidebar()"></div>
  }
  <aside [class.open]="sidebarOpen()">
    <div class="logo">Poup<span>ito</span></div>
    <nav>
      @for (item of navItems; track item.path) {
        <a class="nav-item" [routerLink]="item.path" routerLinkActive="active" (click)="closeSidebar()">
          <span>{{ item.icon }}</span> {{ item.label }}
          @if (item.path === '/orcamentos' && budgetAlertCount() > 0) {
            <span class="alert-badge">{{ budgetAlertCount() }}</span>
          }
        </a>
      }
    </nav>
    <div class="sidebar-footer">
      @if (currentUser(); as user) {
        <div class="user-email" [title]="user.email">{{ user.email }}</div>
      }
      <button class="theme-toggle" type="button" (click)="toggleTheme()">
        {{ theme() === 'dark' ? '☀️ Tema claro' : '🌙 Tema escuro' }}
      </button>
      <button class="logout-btn" (click)="logout()">Sair</button>
    </div>
  </aside>
  <main>
    <router-outlet />
  </main>
</div>
