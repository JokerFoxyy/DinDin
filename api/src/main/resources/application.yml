server:
  servlet:
    context-path: /api

spring:
  application:
    name: dindin-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/dindin}
    username: ${DB_USER:dindin}
    password: ${DB_PASSWORD:dindin-dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:dindin-dev-secret-do-not-use-in-production-0123456789}
    access-expiration: ${JWT_ACCESS_EXPIRATION:PT15M}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:P30D}
  security:
    cookie-secure: ${COOKIE_SECURE:false}
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX:10}
      window: ${AUTH_RATE_LIMIT_WINDOW:PT1M}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
