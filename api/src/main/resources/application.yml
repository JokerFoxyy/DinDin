server:
  servlet:
    context-path: /api

spring:
  application:
    name: dindin-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/dindin}
    username: ${DB_USER:dindin}
    password: ${DB_PASSWORD:dindin-dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:dindin-dev-secret-do-not-use-in-production-0123456789}
    expiration: ${JWT_EXPIRATION:PT2H}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
